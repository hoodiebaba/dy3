{% extends "base.html" %}
{% block content %}
{% load static %}
<body class="sb-nav-fixed" style="background-color: #eff7fe;">
    {% include "navHeader.html" %}
    <div id="layoutSidenav">
        {% include "navSideBar.html" %}
        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid">
                    <div class="container-fluid">
                        <div class="row justify-content-center">
                            <div class="col-lg-12">
                                <div class="card shadow-lg border-0 rounded-lg mt-5">
                                    <div class="card-body">
                                        {% for message in messages %}
                                        <p style="color:green">{{message}}</p>
                                        {% endfor %}
                                        <form action="" method="POST" enctype="multipart/form-data"
                                            class="was-validated">
                                            {% csrf_token %}

                                            <div class="form-group row">
                                                <div class="form-group col-md-6 row">
                                                    <label for="version" class="col-md-4">HW/SW Load</label>
                                                    <select class="custom-select col-md-8" name="version" id="version" required>
                                                        <option value="" selected>Please Select ...</option>
                                                        {% for item in versions %}
                                                        <option value="{{item}}">{{item}}</option>
                                                        {% endfor %}
                                                    </select>
                                                </div>
                                                <div class="form-group col-md-6 row">
                                                    <label for="market" class="col-md-4">Market</label>
                                                    <select class="custom-select col-md-8" name="market" id="market" required>
                                                        <option value="" selected>Please Select ...</option>
                                                        {% for item in market %}
                                                        <option value="{{item}}">{{item}}</option>
                                                        {% endfor %}
                                                    </select>
                                                </div>
                                                <div class="form-group col-md-6 row">
                                                    <label for="sites" class="col-md-4">Site Id</label>
                                                    <input type="text" class="form-control col-md-8" id="sites" name="sites" placeholder="SiteId.." required>
                                                </div>
                                            
                                                <div class="form-group col-md-6 row">
                                                    <label for="audit_type" class="col-md-4">Audit Tpe</label>
                                                    <select class="custom-select col-md-8" name="audit_type" id="audit_type" required>
                                                        <option value="" selected>Please Select ...</option>
                                                        {% for item in audit_type %}
                                                        <option value="{{item}}">{{item}}</option>
                                                        {% endfor %}
                                                    </select>
                                                </div>
                                                <div class="form-group col-md-6 row">
                                                    <label for="dlonly" class="col-md-4">earfcndl for B66 if DLOnly</label>
                                                    <input type="text" class="form-control col-md-8" id="dlonly" name="dlonly"
                                                           placeholder="sepeareted by comma" >
                                                </div>
                                                <div class="form-group col-md-6 row">
                                                    <label for="femto" class="col-md-4">UMTS Femto arfcnValueUtranDl</label>
                                                    <input type="text" class="col-md-8 form-control" id="femto" name="femto"
                                                           placeholder="Femto UtranDl sepeareted by comma" >
                                                </div>
                                                <div class="form-group col-md-6 row">
                                                    <label for="software_log" class="col-md-4">Upload DCGK Files</label>
                                                    <div class="custom-file col-md-8 ">
                                                        <input type="file" class="custom-file-input" id="software_log" name="software_log" required accept=".zip">
                                                        <label class="custom-file-label" for="validatedCustomFile" id="software_log">Upload ziped DCGK file...</label>
                                                    </div>
                                                </div>
											</div>
											<div class="form-row centerbtn">
                                                <button type="submit" class="btn btn-primary">Submit</button>
                                            </div>
                                        </form>
                                    </div>
                                    <div class="card-footer text-center">
                                        <div class="small footer-text"><a class="footer-text" href="/ATT/GSAuditList">Audit List</a></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script>var customer1={{customer1|safe}};</script>
{% endblock %}
