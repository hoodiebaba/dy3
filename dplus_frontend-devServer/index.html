<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favico.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DATAPLUS</title>
</head>
<!-- <body class="bg-hero" style="background-position: 50% 5%; background-image: url('/login_background.jpg');"> -->

<body>
  <div id="root"></div>
  <div id="parent">
    <script>
      let isDragging = false;
      let initialX;
      let initialY;

      const parent = document.getElementById("parent");

      parent.addEventListener("mousedown", (e) => {
        // Check if the clicked element is not the close button
        if (e.target.tagName !== 'circle' && e.target.tagName !== 'line') {
          isDragging = true;
          initialX = e.clientX - parent.getBoundingClientRect().left;
          initialY = e.clientY - parent.getBoundingClientRect().top;
          parent.classList.add("dragging");
        }
      });

      document.addEventListener("mousemove", (e) => {
        if (isDragging) {
          const newX = e.clientX - initialX;
          const newY = e.clientY - initialY;

          parent.style.left = newX + "px";
          parent.style.top = newY + "px";
        }
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
        parent.classList.remove("dragging");
      });
    </script>
    
  </div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    function hideValueShower() {
      // document.getElementById("finalview").style.animation = "mymove 5s reverse"
      event.stopPropagation();
      document.getElementById("finalshow").innerHTML = ``
      const finalview = document.getElementById("finalview");
      finalview.classList.add("clone");
      finalview.classList.remove("open");

    }


    function setValueShower(data) {

      // console.log(JSON.parse(data), "datadatadata")

      let newdata = JSON.parse(data)
      // console.log(newdata, 'alldata ')
      document.getElementById("cellNameDiv").innerHTML = newdata.Cell_name;

      let final = Object.keys(newdata).map((itm) => {
        return `<tr><td style="border:1px solid;padding:4px;text-align:right;font-size:10px;"><span>${itm}</span></td><td style="border:1px solid;padding:4px;text-align:left;font-size:10px;"><span>${newdata[itm]}</span></td></tr>`
      }).join("")

      document.getElementById("finalshow").innerHTML = `<table border=1>${final}</table>`
      finalview.classList.add("open");
      finalview.classList.remove("clone");
    }

    function copyToClipboard(event) {
      // Check if the event target is the image
      // alert(event.target.tagName)
      if (event.target.tagName === 'svg') {
        // Get the text content from the parent div
        const parentText = document.getElementById("parent").innerText;

        // Create a temporary textarea element
        const tempTextarea = document.createElement("textarea");
        tempTextarea.value = parentText;

        // Append the textarea to the document
        document.body.appendChild(tempTextarea);

        // Select the text in the textarea
        tempTextarea.select();
        tempTextarea.setSelectionRange(0, 99999); // For mobile devices

        // Copy the selected text to the clipboard
        document.execCommand("copy");

        // Remove the temporary textarea
        document.body.removeChild(tempTextarea);

        Swal.fire({
          icon: 'success',
          title: 'Copied to Clipboard!',
          showConfirmButton: false,
          timer: 1000,
          // customClass: {
          //   popup: 'custom-swal' 
          // }
        });
      }
    }

    function moveToDifferentPage(event) {
      window.location.href="/showGraph"
    }

    

  </script>
</body>

</html>
